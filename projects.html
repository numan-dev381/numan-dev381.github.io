<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Projects | Numan Nasir</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <nav class="navbar">

        <a href="index.html" class="logo">
            Numan Nasir
        </a>

        <ul class="nav-links">

            <li><a href="index.html">← Back to Portfolio</a></li>

        </ul>

    </nav>

</header>

<main class="projects-page">

    <section class="projects-header">

        <h1>My Projects</h1>

        <p>
            Browse my university and personal software engineering projects.
        </p>

    </section>

    <section class="projects-toolbar">

        <input
            type="text"
            id="searchProject"
            placeholder="Search projects...">

        <button id="addProjectBtn">
            ➕ Add Project
        </button>

    </section>

    <section id="projectsList" class="projects-list">

        <div class="empty-state">

            <h2>No Projects Available</h2>

            <p>
                Click <strong>Add Project</strong> to create your first project.
            </p>

        </div>

    </section>
<!-- ================= ADD PROJECT MODAL ================= -->

<div id="projectModal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close-btn">&times;</span>

        <h2>Add New Project</h2>

<form id="projectForm">

    <h3>Basic Information</h3>

    <label>Project Name</label>
    <input type="text" placeholder="Enter project name" required>

    <label>Description</label>
    <textarea rows="5" placeholder="Describe your project..." required></textarea>

    <label>Category</label>
    <select>
        <option>Web Development</option>
        <option>Desktop Application</option>
        <option>Mobile Application</option>
        <option>Database</option>
        <option>Networking</option>
        <option>AI / Machine Learning</option>
        <option>Final Year Project</option>
        <option>Other</option>
    </select>

    <label>Semester</label>
    <select>
        <option>Semester 1</option>
        <option>Semester 2</option>
        <option>Semester 3</option>
        <option>Semester 4</option>
        <option>Semester 5</option>
        <option>Semester 6</option>
        <option>Semester 7</option>
        <option>Semester 8</option>
        <option>Personal Project</option>
    </select>

    <label>Technologies Used</label>
    <input type="text" placeholder="HTML, CSS, JavaScript">

    <hr>

    <h3>Project Links</h3>

    <label>GitHub Repository</label>
    <input type="url" placeholder="https://github.com/...">

    <label>Live Website</label>
    <input type="url" placeholder="https://">

    <label>Demo Video</label>
    <input type="url" placeholder="YouTube link">

    <hr>

    <h3>Project Files</h3>

    <label>Project Image</label>
    <input type="file" accept="image/*">

    <label>PDF Report</label>
    <input type="file" accept=".pdf">

    <label>Presentation</label>
    <input type="file" accept=".ppt,.pptx">

    <label>Source Code (ZIP)</label>
    <input type="file" accept=".zip">

    <hr>

<div class="form-buttons">

    <button
        type="button"
        class="btn secondary-btn"
        id="cancelBtn">
        Cancel
    </button>

    <button
        type="submit"
        class="btn primary-btn">
        Save Project
    </button>

</div>

</form>
    </div>

</div>
</main>

<script src="script.js"></script>
<script src="projects.js"></script>
<script type="module" src="app.js"></script>

</body>

</html>
