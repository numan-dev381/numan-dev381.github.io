<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Projects | Numan Nasir</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <nav class="navbar">

        <a href="index.html" class="logo">
            Numan Nasir
        </a>

        <ul class="nav-links">

            <li><a href="index.html">← Back to Portfolio</a></li>

        </ul>

    </nav>

</header>

<main class="projects-page">

    <section class="projects-header">

        <h1>My Projects</h1>

        <p>
            Browse my university and personal software engineering projects.
        </p>

    </section>

    <section class="projects-toolbar">

        <input
            type="text"
            id="searchProject"
            placeholder="Search projects...">

        <button id="addProjectBtn">
            ➕ Add Project
        </button>

    </section>

    <section id="projectsList" class="projects-list">

        <div class="empty-state">

            <h2>No Projects Available</h2>

            <p>
                Click <strong>Add Project</strong> to create your first project.
            </p>

        </div>

    </section>

</main>

<script src="script.js"></script>
<script type="module" src="app.js"></script>

</body>

</html>
