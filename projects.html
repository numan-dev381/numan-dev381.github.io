<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Projects | Numan Nasir</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <nav class="navbar">

        <a href="index.html" class="logo">
            Numan Nasir
        </a>

        <ul class="nav-links">

            <li><a href="index.html">← Back to Portfolio</a></li>

        </ul>

    </nav>

</header>

<main class="projects-page">

    <section class="projects-header">

        <h1>My Projects</h1>

        <p>
            Browse my university and personal software engineering projects.
        </p>

    </section>

    <section class="projects-toolbar">

        <input
            type="text"
            id="searchProject"
            placeholder="Search projects...">

        <button id="addProjectBtn">
            ➕ Add Project
        </button>

    </section>

    <section id="projectsList" class="projects-list">

        <div class="empty-state">

            <h2>No Projects Available</h2>

            <p>
                Click <strong>Add Project</strong> to create your first project.
            </p>

        </div>

    </section>
<!-- ================= ADD PROJECT MODAL ================= -->

<div id="projectModal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close-btn">&times;</span>

        <h2>Add New Project</h2>

<form id="projectForm">

    <label>Project Name *</label>
    <input type="text" id="projectName" required>

    <label>Description *</label>
    <textarea id="projectDescription" rows="4" required></textarea>

    <label>Semester</label>
    <select id="projectSemester">

        <option>Semester 1</option>
        <option>Semester 2</option>
        <option>Semester 3</option>
        <option>Semester 4</option>
        <option selected>Semester 5</option>
        <option>Semester 6</option>
        <option>Semester 7</option>
        <option>Semester 8</option>

    </select>

    <label>Technologies Used</label>
    <input type="text"
           id="projectTech"
           placeholder="HTML, CSS, JavaScript">

    <label>GitHub Repository</label>
    <input type="url" id="projectGithub">

    <label>Live Website</label>
    <input type="url" id="projectWebsite">

    <label>Project Image</label>
    <input type="file"
           id="projectImage"
           accept="image/*">

    <label>PDF Report</label>
    <input type="file"
           id="projectPdf"
           accept=".pdf">

    <label>Presentation</label>
    <input type="file"
           id="projectPresentation"
           accept=".pdf,.ppt,.pptx">

    <label>Source Code (ZIP)</label>
    <input type="file"
           id="projectSource"
           accept=".zip">

    <label>Demo Video Link</label>
    <input type="url"
           id="projectVideo">

    <div class="form-buttons">

        <button type="button"
                id="cancelProject"
                class="btn secondary-btn">

            Cancel

        </button>

        <button type="submit"
                class="btn primary-btn">

            Save Project

        </button>

    </div>

</form>

    </div>

</div>
</main>

<script src="script.js"></script>
<script src="projects.js"></script>
<script type="module" src="app.js"></script>

</body>

</html>
