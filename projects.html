<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Projects | Numan Nasir</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <nav class="navbar">

        <a href="index.html" class="logo">
            Numan Nasir
        </a>

        <ul class="nav-links">

            <li><a href="index.html">← Back to Portfolio</a></li>

        </ul>

    </nav>

</header>

<main class="projects-page">

    <section class="projects-header">

        <h1>My Projects</h1>

        <p>
            Browse my university and personal software engineering projects.
        </p>

    </section>

    <section class="projects-toolbar">

        <input
            type="text"
            id="searchProject"
            placeholder="Search projects...">

        <button id="addProjectBtn">
            ➕ Add Project
        </button>

    </section>

    <section id="projectsList" class="projects-list">

        <div class="empty-state">

            <h2>No Projects Available</h2>

            <p>
                Click <strong>Add Project</strong> to create your first project.
            </p>

        </div>

    </section>
<!-- ================= ADD PROJECT MODAL ================= -->

<div id="projectModal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close-btn">&times;</span>

        <h2>Add New Project</h2>

        <form id="projectForm">

            <input type="text" placeholder="Project Name" required>

            <textarea placeholder="Project Description" rows="4" required></textarea>

            <input type="text" placeholder="Semester">

            <input type="text" placeholder="Technologies Used">

            <input type="url" placeholder="GitHub Repository">

            <input type="url" placeholder="Live Website">

            <button type="submit" class="btn primary-btn">

                Save Project

            </button>

        </form>

    </div>

</div>
</main>

<script src="script.js"></script>
<script type="module" src="app.js"></script>

</body>

</html>
